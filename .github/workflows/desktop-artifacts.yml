name: Desktop Artifacts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/desktop-artifacts.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "gui/**"
      - "bin/factory-control"
      - "bin/factory-control.cmd"
      - "bin/factory-control.ps1"
  push:
    branches:
      - main
    tags:
      - "v*"
      - "acp-v*"
    paths:
      - ".github/workflows/desktop-artifacts.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "gui/**"
      - "bin/factory-control"
      - "bin/factory-control.cmd"
      - "bin/factory-control.ps1"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: factory-control-linux-deb
            artifact_path: gui/src-tauri/target/release/bundle/deb/*.deb
          - os: windows-latest
            artifact_name: factory-control-windows
            artifact_path: gui/src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            artifact_name: factory-control-macos
            artifact_path: gui/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -V
          cargo -V

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            gui/src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('Cargo.lock', 'gui/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Prepare macOS icon
        if: runner.os == 'macOS'
        run: bash ./gui/scripts/prepare-macos-icon.sh

      - name: Build desktop bundle
        working-directory: gui
        run: npm run desktop:build

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/acp-v'))
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: factory-control-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == acp-v* ]]; then
            title="Factory Control ACP Experimental ${tag#acp-}"
            prerelease_flag="--prerelease"
            notes_file="$(mktemp)"
            cat >"$notes_file" <<'EOF'
Experimental ACP release

This release includes the ACP lane as an experimental surface.

Current ACP scope:
- real adapter: Codex
- placeholder only: Claude
- transport: stdio

Important release posture:
- treat ACP as experimental
- keep the current HTTP / Factory gateway lane as the primary stable surface
- run `opengateway acp doctor` before configuring an editor
- use the tracked ACP setup examples in `examples/acp/`
EOF
          else
            title="Factory Control ${tag}"
            prerelease_flag=""
            notes_file=""
          fi

          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber --repo "$GH_REPO"
            if [[ -n "$notes_file" ]]; then
              gh release edit "$tag" \
                --repo "$GH_REPO" \
                --title "$title" \
                --notes-file "$notes_file" \
                $prerelease_flag
            fi
          else
            if [[ -n "$notes_file" ]]; then
              gh release create "$tag" release-assets/* \
                --repo "$GH_REPO" \
                --title "$title" \
                --notes-file "$notes_file" \
                $prerelease_flag
            else
              gh release create "$tag" release-assets/* \
                --repo "$GH_REPO" \
                --title "$title" \
                --generate-notes
            fi
          fi
