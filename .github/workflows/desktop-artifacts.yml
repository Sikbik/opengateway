name: Desktop Artifacts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/desktop-artifacts.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "gui/**"
      - "bin/factory-control"
      - "bin/factory-control.cmd"
      - "bin/factory-control.ps1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop-artifacts.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "gui/**"
      - "bin/factory-control"
      - "bin/factory-control.cmd"
      - "bin/factory-control.ps1"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: factory-control-linux
            artifact_path: gui/src-tauri/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            artifact_name: factory-control-windows
            artifact_path: gui/src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            artifact_name: factory-control-macos
            artifact_path: gui/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            gui/src-tauri -> gui/src-tauri/target

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Prepare macOS icon
        if: runner.os == 'macOS'
        run: bash ./gui/scripts/prepare-macos-icon.sh

      - name: Build desktop bundle
        working-directory: gui
        run: npm run desktop:build

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
