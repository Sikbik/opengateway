name: ACP Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/acp-smoke.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "gui/**"
      - "examples/acp/**"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/acp-smoke.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "gui/**"
      - "examples/acp/**"
      - "README.md"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -V
          cargo -V

      - name: Cache Rust dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            gui/src-tauri/target
          key: ${{ runner.os }}-acp-rust-${{ hashFiles('Cargo.lock', 'gui/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-acp-rust-

      - name: Run Rust tests
        run: cargo test

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: ACP doctor smoke
        run: |
          set -euo pipefail
          cargo run --quiet -- acp doctor > /tmp/acp-doctor.txt
          grep -F "ACP doctor" /tmp/acp-doctor.txt
          grep -F "command: opengateway acp" /tmp/acp-doctor.txt
          grep -F "runtime-readiness:" /tmp/acp-doctor.txt

      - name: ACP snapshot smoke
        run: |
          set -euo pipefail
          cargo run --quiet -- acp snapshot > /tmp/acp-snapshot.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/acp-snapshot.json").read_text())
          assert payload["experimental"] is True
          assert payload["command"] == "opengateway acp"
          assert payload["transport"] == "stdio"
          assert payload["process_model"] == "one-session-one-subprocess"
          assert isinstance(payload["agents"], list)
          assert isinstance(payload["issues"], list)
          assert isinstance(payload["sessions"], list)
          assert any(agent["kind"] == "codex" for agent in payload["agents"])
          assert any(agent["kind"] == "claude" for agent in payload["agents"])
          PY

      - name: Current doctor smoke
        run: |
          set -euo pipefail
          cargo run --quiet -- doctor > /tmp/opengateway-doctor.txt
          grep -F "version:" /tmp/opengateway-doctor.txt
          grep -F "default_config:" /tmp/opengateway-doctor.txt
          grep -F "auth_dir:" /tmp/opengateway-doctor.txt
          grep -F "log_file:" /tmp/opengateway-doctor.txt

      - name: GUI snapshot smoke
        run: |
          set -euo pipefail
          cargo run --quiet -- gui-snapshot > /tmp/gui-snapshot.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/gui-snapshot.json").read_text())
          assert isinstance(payload["generatedAt"], int)
          assert payload["environment"]["preferredRuntime"] in {"browser", "desktop"}
          assert payload["gateway"]["apiBaseUrl"].endswith("/v1")
          assert "homePath" in payload["factory"]
          assert isinstance(payload["models"], list)
          assert isinstance(payload["droids"], list)
          PY

      - name: Factory sync smoke
        run: |
          set -euo pipefail
          root="$(mktemp -d)"
          config="$root/config.json"
          settings="$root/settings.json"
          cat >"$settings" <<'JSON'
          {
            "customModels": [
              {
                "model": "gpt-5.3-codex(xhigh)",
                "id": "custom:GPT-5.3-Codex-(XHigh)-3",
                "index": 3,
                "baseUrl": "http://127.0.0.1:42069/v1",
                "apiKey": "secret",
                "displayName": "GPT-5.3 Codex (XHigh)",
                "noImageSupport": false,
                "provider": "openai"
              }
            ],
            "sessionDefaultSettings": {
              "model": "custom:GPT-5.3-Codex-(XHigh)-3",
              "reasoningEffort": "xhigh"
            },
            "missionModelSettings": {
              "orchestratorModel": "custom:GPT-5.3-Codex-(XHigh)-3",
              "orchestratorReasoningEffort": "none",
              "workerModel": "custom:GPT-5.3-Codex-(XHigh)-3",
              "workerReasoningEffort": "none",
              "validationWorkerModel": "custom:GPT-5.3-Codex-(XHigh)-3",
              "validationWorkerReasoningEffort": "none"
            }
          }
          JSON
          export config settings
          cargo run --quiet -- sync-factory \
            --base-url http://127.0.0.1:42069 \
            --api-key secret \
            --factory-config "$config" \
            --factory-settings "$settings" \
            --models "gpt-5.3-codex(xhigh),gpt-5.4(xhigh)"
          python3 - <<'PY'
          import json
          from pathlib import Path
          import os

          config = json.loads(Path(os.environ["config"]).read_text())
          settings = json.loads(Path(os.environ["settings"]).read_text())
          assert len(config["custom_models"]) == 2
          assert any(item["model"] == "gpt-5.4(xhigh)" for item in config["custom_models"])
          custom_models = settings["customModels"]
          preferred = next(item for item in custom_models if item["model"] == "gpt-5.4(xhigh)")
          preferred_id = preferred["id"]
          assert settings["sessionDefaultSettings"]["model"] == preferred_id
          assert settings["missionModelSettings"]["workerReasoningEffort"] == "xhigh"
          PY

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Build GUI
        working-directory: gui
        run: npm run build
